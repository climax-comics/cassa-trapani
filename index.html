<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cassa Trapani">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a237e">
<title>Gestionale Cassa - Trapani Comix 2026</title>
<style>
:root {
  --primary: #1a237e;
  --primary-light: #3949ab;
  --accent: #ff6f00;
  --accent-light: #ffa726;
  --bg: #f5f5f5;
  --card: #ffffff;
  --text: #212121;
  --text-light: #757575;
  --border: #e0e0e0;
  --success: #2e7d32;
  --danger: #c62828;
  --cash-bg: #e8f5e9;
  --card-bg: #e3f2fd;
  --expense-bg: #fce4ec;
  --summary-bg: #fff8e1;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: var(--bg);
  
  color: var(--text);
  min-height: 100vh;
  font-weight: 700;
}

.container {
  margin-top: 10px;
  padding: 20px;
}

header {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: white;
  padding: 20px 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 2px 10px rgba(0,0,0,.2);
  position: sticky;
  top: 0;
  z-index: 100;
}

header h1 { font-size: 1.5rem; font-weight: 600; }
header .subtitle { font-size: .85rem; opacity: .8; margin-top: 2px; }

.header-actions { display: flex; gap: 10px; align-items: center; }

.btn {
  padding: 8px 18px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: .85rem;
  font-weight: 500;
  transition: all .2s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: var(--accent-light); transform: translateY(-1px); }
.btn-outline { background: transparent; color: white; border: 1.5px solid rgba(255,255,255,.5); }
.btn-outline:hover { background: rgba(255,255,255,.15); }
.btn-danger { background: var(--danger); color: white; }
.btn-danger:hover { opacity: .9; }
.btn-success { background: var(--success); color: white; }
.btn-success:hover { opacity: .9; }

.container { max-width: 1400px; margin: 0 auto; }

.tabs {
  display: flex;
  gap: 4px;
  background: rgba(255,255,255,0.3);
  backdrop-filter: blur(6px);
  padding: 6px;
  border-radius: 10px;
  margin-bottom: 20px;
  overflow-x: auto;
  box-shadow: 0 1px 4px rgba(0,0,0,.08);
}

.tab {
  padding: 10px 18px;
  border: none;
  background: transparent;
  cursor: pointer;
  border-radius: 8px;
  font-size: .85rem;
  font-weight: 500;
  color: var(--text-light);
  white-space: nowrap;
  transition: all .2s;
}

.tab:hover { background: var(--bg); color: var(--text); }
.tab.active { background: var(--primary); color: white; }

.tab-content { display: none; }
.tab-content.active { display: block; }

.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 20px; }

.card {
  background: rgba(255,255,255,0.3);
  backdrop-filter: blur(6px);
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,.1);
  overflow: hidden;
  transition: box-shadow .2s;
}

.card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.15); }

.card-header {
  padding: 14px 20px;
  font-weight: 600;
  font-size: 1rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.card-header.fumetti { background: rgba(232,234,246,0.5); color: var(--primary); }
.card-header.libri { background: rgba(224,242,241,0.5); color: #00695c; }
.card-header.kids { background: rgba(252,228,236,0.5); color: #ad1457; }
.card-header.tunue { background: rgba(255,243,224,0.5); color: #e65100; }
.card-header.gigaciao { background: rgba(243,229,245,0.5); color: #6a1b9a; }
.card-header.climax { background: rgba(232,245,233,0.5); color: #2e7d32; }
.card-header.glifo { background: rgba(225,245,254,0.5); color: #0277bd; }
.card-header.ippocampo { background: rgba(251,233,231,0.5); color: #bf360c; }

.card-header .tot {
  font-size: 1.1rem;
  font-weight: 700;
}

.card-body { padding: 16px 20px; }

.day-section { margin-bottom: 14px; }

.day-label {
  font-size: .75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: var(--text-light);
  margin-bottom: 6px;
}

.input-row {
  display: flex;
  gap: 10px;
  margin-bottom: 6px;
  align-items: center;
}

.input-row label {
  font-size: .8rem;
  color: var(--text);
  min-width: 80px;
}

.euro-wrap {
  display: flex;
  align-items: center;
  gap: 4px;
}

.euro-wrap::before {
  content: '€';
  font-weight: 700;
  font-size: .9rem;
}

.input-row input {
  flex: 1;
  padding: 8px 12px;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  font-size: .9rem;
  font-weight: 700;
  transition: border-color .2s;
  text-align: right;
  max-width: 150px;
}

.input-row input:focus {
  outline: none;
  border-color: var(--primary-light);
  box-shadow: 0 0 0 3px rgba(26,35,126,.1);
}

.input-row input.cash-input { background: var(--cash-bg); }
.input-row input.card-input { background: var(--card-bg); }

.day-total {
  text-align: right;
  font-size: .8rem;
  color: var(--text-light);
  padding-top: 2px;
}

.day-total span { font-weight: 600; color: var(--text); }

.section-divider {
  height: 1px;
  background: var(--border);
  margin: 10px 0;
}

/* Agio Section */
.agio-card { grid-column: 1 / -1; }

.agio-table {
  width: 100%;
  border-collapse: collapse;
}

.agio-table th, .agio-table td {
  padding: 10px 14px;
  text-align: center;
  border-bottom: 1px solid var(--border);
  font-size: .85rem;
}

.agio-table th {
  background: var(--bg);
  font-weight: 600;
  color: var(--text-light);
  font-size: .75rem;
  text-transform: uppercase;
  letter-spacing: .5px;
}

.agio-table input {
  width: 70px;
  padding: 6px 8px;
  border: 1.5px solid var(--border);
  border-radius: 4px;
  text-align: center;
  font-size: .85rem;
}

.agio-table input:focus {
  outline: none;
  border-color: var(--primary-light);
}

.agio-table .val { font-weight: 600; color: var(--primary); }

/* Spese Section */
.spese-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 12px;
}

.spese-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 14px;
  background: rgba(252,228,236,0.4);
  backdrop-filter: blur(6px);
  border-radius: 8px;
}

.spese-item label { font-size: .85rem; font-weight: 500; }

.spese-item input {
  width: 100px;
  padding: 6px 10px;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  text-align: right;
  font-size: .9rem;
}

.spese-item input:focus { outline: none; border-color: var(--danger); }

.spese-total {
  margin-top: 14px;
  text-align: right;
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--danger);
  padding: 10px 14px;
  background: rgba(252,228,236,0.4);
  backdrop-filter: blur(6px);
  border-radius: 8px;
}

/* Resoconto */
.resoconto-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px;
}

.resoconto-box {
  padding: 20px;
  border-radius: 12px;
  text-align: center;
}

.resoconto-box.totale { background: rgba(232,234,246,0.45); backdrop-filter: blur(6px); }
.resoconto-box.contanti { background: rgba(232,245,233,0.45); backdrop-filter: blur(6px); }
.resoconto-box.bancomat { background: rgba(227,242,253,0.45); backdrop-filter: blur(6px); }
.resoconto-box.netto { background: rgba(255,248,225,0.45); backdrop-filter: blur(6px); }

.resoconto-label {
  font-size: .8rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: 600;
  color: var(--text-light);
  margin-bottom: 8px;
}

.resoconto-value {
  font-size: 2rem;
  font-weight: 700;
  color: var(--text);
}

.resoconto-value.positive { color: var(--success); }
.resoconto-value.negative { color: var(--danger); }

/* Totali per giorno */
.totali-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

.totali-table th, .totali-table td {
  padding: 12px 16px;
  text-align: right;
  border-bottom: 1px solid var(--border);
  font-size: .9rem;
}

.totali-table th {
  text-align: left;
  background: var(--bg);
  font-weight: 600;
  color: var(--text-light);
}

.totali-table td:first-child { text-align: left; font-weight: 500; }
.totali-table tr:last-child { font-weight: 700; background: var(--summary-bg); }

/* Corner sections */
.corner-input-row {
  display: flex;
  gap: 10px;
  margin-bottom: 6px;
  align-items: center;
}

.corner-input-row label {
  font-size: .8rem;
  color: var(--text-light);
  min-width: 60px;
}

.corner-input-row input {
  flex: 1;
  padding: 8px 12px;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  font-size: .9rem;
  text-align: right;
  max-width: 130px;
}

.corner-input-row input:focus {
  outline: none;
  border-color: var(--primary-light);
}

.corner-total-row {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  font-weight: 600;
  font-size: .9rem;
  border-top: 2px solid var(--border);
  margin-top: 8px;
}

/* Climax specific */
.climax-row {
  display: flex;
  gap: 10px;
  margin-bottom: 6px;
  align-items: center;
}

.climax-row label {
  font-size: .8rem;
  color: var(--text-light);
  min-width: 110px;
}

.climax-row input {
  flex: 1;
  padding: 8px 12px;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  font-size: .9rem;
  text-align: right;
  max-width: 130px;
}

.climax-row input:focus { outline: none; border-color: var(--success); }

.climax-profit {
  text-align: right;
  font-size: .8rem;
  color: var(--success);
  font-weight: 600;
}

/* Print */
@media print {
  header { position: static; }
  .tabs, .header-actions { display: none; }
  .tab-content { display: block !important; page-break-inside: avoid; margin-bottom: 30px; }
  .card { box-shadow: none; border: 1px solid #ccc; }
  body { background: white; }
}

@media (max-width: 768px) {
  header { flex-direction: column; gap: 8px; text-align: center; padding: 12px 10px; }
  header > div:first-child { flex-direction: column; gap: 8px; }
  header h1 { font-size: 1.1rem; }
  .header-actions { flex-wrap: wrap; justify-content: center; }
  .btn { padding: 6px 12px; font-size: .75rem; }
  .logo-badge { padding: 4px 10px; }
  .logo-badge img { height: 28px; }
  .logo-badge .powered-by { font-size: .5rem; }

  .container { padding: 10px 8px; }
  .grid { grid-template-columns: 1fr; gap: 12px; }

  .tabs { flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; gap: 2px; padding: 4px; }
  .tab { padding: 8px 10px; font-size: .7rem; min-width: fit-content; }

  .card-body { padding: 12px 14px; }
  .card-header { padding: 10px 14px; font-size: .9rem; }

  .input-row { gap: 6px; }
  .input-row label { min-width: 65px; font-size: .75rem; }
  .input-row input { max-width: 120px; padding: 7px 8px; font-size: .85rem; }

  .corner-input-row label { min-width: 50px; font-size: .75rem; }
  .corner-input-row input { max-width: 120px; padding: 7px 8px; font-size: .85rem; }

  .climax-row label { min-width: 90px; font-size: .75rem; }
  .climax-row input { max-width: 120px; padding: 7px 8px; font-size: .85rem; }

  .resoconto-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
  .resoconto-box { padding: 14px 10px; }
  .resoconto-label { font-size: .65rem; }
  .resoconto-value { font-size: 1.2rem; }

  .agio-table th, .agio-table td { padding: 8px 6px; font-size: .75rem; }
  .agio-table input { width: 50px; font-size: .75rem; }

  .spese-grid { grid-template-columns: 1fr; gap: 8px; }
  .spese-item { padding: 8px 10px; }
  .spese-item label { font-size: .8rem; }
  .spese-item input { width: 80px; font-size: .8rem; }

  .totali-table th, .totali-table td { padding: 8px 6px; font-size: .75rem; }

  .day-total { font-size: .75rem; }
}

.logo-badge {
  display: flex;
  flex-direction: column;
  align-items: center;
  background: #000;
  border-radius: 16px;
  padding: 6px 14px;
  gap: 2px;
}

.logo-badge .powered-by {
  font-size: .55rem;
  letter-spacing: 2px;
  color: rgba(255,255,255,.7);
  text-transform: uppercase;
}

.logo-badge img {
  height: 38px;
  width: auto;
  border-radius: 6px;
}

.save-indicator {
  font-size: .75rem;
  opacity: .7;
  padding: 4px 10px;
  border-radius: 20px;
  background: rgba(255,255,255,.15);
}
</style>
</head>

              <th>Agio %</th>

      <div class="card-body">

            <tr><th></th><th>Contanti</th><th>Bancomat</th><th>Totale</th></tr>

</div>

<script>
const IS_ONLINE = window.location.hostname.includes('github.io');
const PUBLISHED_DATA = {"vendite":{"fumetti":{"0":{"contanti":272.8,"bancomat":280.5},"1":{"contanti":1016.9,"bancomat":948},"2":{"contanti":0,"bancomat":0}},"libri":{"0":{"contanti":99.8,"bancomat":105.7},"1":{"contanti":689.5,"bancomat":324.5},"2":{"contanti":0,"bancomat":0}},"kids":{"0":{"contanti":12.9,"bancomat":12},"1":{"contanti":91.7,"bancomat":42},"2":{"contanti":0,"bancomat":50}},"tunue":{"0":{"contanti":96.5,"bancomat":71.4},"1":{"contanti":278.6,"bancomat":316.2},"2":{"contanti":0,"bancomat":0}},"gigaciao":{"0":{"contanti":137.6,"bancomat":285},"1":{"contanti":195.69,"bancomat":193.81},"2":{"contanti":0,"bancomat":0}},"poster":{"0":{"contanti":28.5,"bancomat":0},"1":{"contanti":132,"bancomat":20},"2":{"contanti":0,"bancomat":0}}},"corners":{"glifo":{"0":12,"1":0,"2":0},"revue":{"0":0,"1":120,"2":0},"ippocampo":{"0":96.8,"1":164.89,"2":0}},"climax":{"0":{"venduto":36,"costo":0},"1":{"venduto":31.9,"costo":0},"2":{"venduto":0,"costo":0},"costoPerc":70},"agio":{"fumetti":32,"libri":32,"kids":32,"tunue":40,"gigaciao":40,"glifo":40,"revue":30,"ippocampo":32},"spese":{"sacchetti":10,"rotolo":50,"personale":400,"extra_1779187878383":10},"speseExtra":[{"id":"extra_1779187878383","name":"Scotch"}]};
const DAYS = ['Giorno 1', 'Giorno 2', 'Giorno 3'];

const STANDS_VENDITE = [
  { id: 'fumetti', name: 'Bookshop Fumetti', theme: 'fumetti', type: 'cashcard' },
  { id: 'libri', name: 'Bookshop Libri', theme: 'libri', type: 'cashcard' },
  { id: 'kids', name: 'Bookshop Kids', theme: 'kids', type: 'cashcard' },
  { id: 'tunue', name: "Tunue'", theme: 'tunue', type: 'cashcard' },
  { id: 'gigaciao', name: 'GigaCiao', theme: 'gigaciao', type: 'cashcard' },
  { id: 'poster', name: 'Poster + Gadget', theme: 'ippocampo', type: 'cashcard' },
];

const CORNERS = [
  { id: 'glifo', name: 'Corner Glifo', theme: 'glifo' },
  { id: 'revue', name: 'Corner Revue', theme: 'glifo' },
  { id: 'ippocampo', name: 'Corner Ippocampo', theme: 'ippocampo' },
];

const SPESE_ITEMS = [
  { id: 'sacchetti', name: 'Sacchetti', default: 10 },
  { id: 'rotolo', name: 'Rotolo', default: 50 },
  { id: 'personale', name: 'Personale', default: 400 },
];

const state = loadState();

function defaultState() {
  const s = { vendite: {}, corners: {}, climax: {}, agio: {}, spese: {} };
  const AGIO_DEFAULT = { fumetti: 32, libri: 32, kids: 32, tunue: 40, gigaciao: 40, glifo: 40, revue: 30, ippocampo: 32 };
  STANDS_VENDITE.forEach(st => {
    s.vendite[st.id] = {};
    DAYS.forEach((_, i) => {
      s.vendite[st.id][i] = { contanti: 0, bancomat: 0 };
    });
    s.agio[st.id] = AGIO_DEFAULT[st.id] || 0;
  });
  CORNERS.forEach(c => {
    s.corners[c.id] = {};
    DAYS.forEach((_, i) => { s.corners[c.id][i] = 0; });
    s.agio[c.id] = AGIO_DEFAULT[c.id] || 0;
  });
  DAYS.forEach((_, i) => {
    s.climax[i] = { venduto: 0, costo: 0 };
  });
  SPESE_ITEMS.forEach(sp => { s.spese[sp.id] = sp.default; });
  return s;
}

function loadState() {
  if (IS_ONLINE && PUBLISHED_DATA) return JSON.parse(JSON.stringify(PUBLISHED_DATA));
  try {
    const saved = localStorage.getItem('cassaTrapani2026');
    if (saved) return JSON.parse(saved);
  } catch (e) {}
  return defaultState();
}

function saveState() {
  localStorage.setItem('cassaTrapani2026', JSON.stringify(state));
  const ind = document.getElementById('saveIndicator');
  ind.textContent = 'Salvato!';
  setTimeout(() => ind.textContent = 'Salvato', 1500);
}

function fmt(n) {
  return '€ ' + Number(n || 0).toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, '.');
}

function parseNum(v) {
  return parseFloat(v) || 0;
}

// BUILD VENDITE
function buildVendite() {
  const grid = document.getElementById('vendite-grid');
  grid.innerHTML = '';
  STANDS_VENDITE.forEach(stand => {
    const card = document.createElement('div');
    card.className = 'card';
    let tot = 0;
    DAYS.forEach((_, i) => {
      tot += (state.vendite[stand.id]?.[i]?.contanti || 0) + (state.vendite[stand.id]?.[i]?.bancomat || 0);
    });
    let html = `<div class="card-header ${stand.theme}"><span>${stand.name}</span><span class="tot" id="tot-${stand.id}">${fmt(tot)}</span></div><div class="card-body">`;
    DAYS.forEach((day, i) => {
      const c = state.vendite[stand.id]?.[i]?.contanti || 0;
      const b = state.vendite[stand.id]?.[i]?.bancomat || 0;
      const dayTot = c + b;
      html += `
        <div class="day-section">
          <div class="day-label">${day}</div>
          <div class="input-row">
            <label>Contanti</label>
            <div class="euro-wrap"><input type="number" step="0.01" min="0" class="cash-input" value="${c || ''}"
              data-stand="${stand.id}" data-day="${i}" data-field="contanti"
              oninput="updateVendita(this)" placeholder="0,00"></div>
          </div>
          <div class="input-row">
            <label>Bancomat</label>
            <div class="euro-wrap"><input type="number" step="0.01" min="0" class="card-input" value="${b || ''}"
              data-stand="${stand.id}" data-day="${i}" data-field="bancomat"
              oninput="updateVendita(this)" placeholder="0,00"></div>
          </div>
          <div class="day-total">Subtotale: <span id="daytot-${stand.id}-${i}">${fmt(dayTot)}</span></div>
        </div>`;
      if (i < DAYS.length - 1) html += '<div class="section-divider"></div>';
    });
    html += '</div>';
    card.innerHTML = html;
    grid.appendChild(card);
  });
}

function refreshVenditeTotals() {
  STANDS_VENDITE.forEach(stand => {
    let tot = 0;
    DAYS.forEach((_, i) => {
      const c = state.vendite[stand.id]?.[i]?.contanti || 0;
      const b = state.vendite[stand.id]?.[i]?.bancomat || 0;
      tot += c + b;
      const dtEl = document.getElementById('daytot-' + stand.id + '-' + i);
      if (dtEl) dtEl.textContent = fmt(c + b);
    });
    const totEl = document.getElementById('tot-' + stand.id);
    if (totEl) totEl.textContent = fmt(tot);
  });
}

function updateVendita(el) {
  const { stand, day, field } = el.dataset;
  if (!state.vendite[stand]) state.vendite[stand] = {};
  if (!state.vendite[stand][day]) state.vendite[stand][day] = { contanti: 0, bancomat: 0 };
  state.vendite[stand][day][field] = parseNum(el.value);
  saveState();
  refreshVenditeTotals();
  refreshAgioTotals();
  buildResoconto();
}

// BUILD CORNERS
function buildCorners() {
  const grid = document.getElementById('corners-grid');
  grid.innerHTML = '';
  CORNERS.forEach(corner => {
    const card = document.createElement('div');
    card.className = 'card';
    let tot = 0;
    DAYS.forEach((_, i) => { tot += (state.corners[corner.id]?.[i] || 0); });
    let html = `<div class="card-header ${corner.theme}"><span>${corner.name}</span><span class="tot" id="tot-${corner.id}">${fmt(tot)}</span></div><div class="card-body">`;
    DAYS.forEach((day, i) => {
      const v = state.corners[corner.id]?.[i] || 0;
      html += `
        <div class="day-section">
          <div class="day-label">${day}</div>
          <div class="corner-input-row">
            <label>Venduto</label>
            <div class="euro-wrap"><input type="number" step="0.01" min="0" value="${v || ''}"
              data-corner="${corner.id}" data-day="${i}"
              oninput="updateCorner(this)" placeholder="0,00"></div>
          </div>
        </div>`;
      if (i < DAYS.length - 1) html += '<div class="section-divider"></div>';
    });
    html += `<div class="corner-total-row"><span>Totale</span><span id="cornertot-${corner.id}">${fmt(tot)}</span></div></div>`;
    card.innerHTML = html;
    grid.appendChild(card);
  });
}

function updateCorner(el) {
  const { corner, day } = el.dataset;
  if (!state.corners[corner]) state.corners[corner] = {};
  state.corners[corner][day] = parseNum(el.value);
  saveState();
  let tot = 0;
  DAYS.forEach((_, i) => { tot += (state.corners[corner]?.[i] || 0); });
  const totEl = document.getElementById('tot-' + corner);
  if (totEl) totEl.textContent = fmt(tot);
  const ctEl = document.getElementById('cornertot-' + corner);
  if (ctEl) ctEl.textContent = fmt(tot);
  refreshAgioTotals();
  buildResoconto();
}

// BUILD CLIMAX
function buildClimax() {
  const grid = document.getElementById('climax-grid');
  grid.innerHTML = '';
  if (!state.climax.costoPerc) state.climax.costoPerc = 70;
  const perc = state.climax.costoPerc;

  const card = document.createElement('div');
  card.className = 'card';
  let totVenduto = 0, totCosto = 0;
  DAYS.forEach((_, i) => {
    const v = state.climax[i]?.venduto || 0;
    totVenduto += v;
    totCosto += v * perc / 100;
  });
  const profit = totVenduto - totCosto;
  let html = `<div class="card-header climax"><span>Climax</span><span class="tot" id="tot-climax">C.P. ${fmt(totCosto)}</span></div><div class="card-body">`;
  html += `
    <div class="day-section" style="background:#e8f5e9;padding:12px;border-radius:8px;margin-bottom:14px">
      <div class="climax-row">
        <label style="font-weight:600">% Costo Prodotto</label>
        <input type="number" step="0.1" min="0" max="100" value="${perc || ''}"
          oninput="updateClimaxPerc(this)" placeholder="0" style="max-width:80px;text-align:center">
        <span style="font-size:.85rem;color:var(--text-light);margin-left:4px">%</span>
      </div>
    </div>`;
  DAYS.forEach((day, i) => {
    const v = state.climax[i]?.venduto || 0;
    const c = v * perc / 100;
    html += `
      <div class="day-section">
        <div class="day-label">${day}</div>
        <div class="climax-row">
          <label>Venduto</label>
          <div class="euro-wrap"><input type="number" step="0.01" min="0" value="${v || ''}"
            data-day="${i}"
            oninput="updateClimaxVenduto(this)" placeholder="0,00"></div>
        </div>
        <div class="climax-row">
          <label>Costo Prodotto</label>
          <span id="climax-costo-${i}" style="font-weight:600;font-size:.9rem;min-width:130px;text-align:right;display:inline-block">${fmt(c)}</span>
        </div>
        <div class="climax-profit" id="climax-profit-${i}">Profitto: ${fmt(v - c)}</div>
      </div>`;
    if (i < DAYS.length - 1) html += '<div class="section-divider"></div>';
  });
  html += `
    <div style="border-top:2px solid var(--border);margin-top:12px;padding-top:12px;display:flex;justify-content:space-between;font-weight:600;font-size:.9rem">
      <span>Tot. Venduto: <span id="climax-tot-venduto">${fmt(totVenduto)}</span></span>
      <span>Tot. Costo: <span id="climax-tot-costo">${fmt(totCosto)}</span></span>
    </div>`;
  html += '</div>';
  card.innerHTML = html;
  grid.appendChild(card);
}

function refreshClimaxCalcs() {
  const perc = state.climax.costoPerc || 0;
  let totV = 0, totC = 0;
  DAYS.forEach((_, i) => {
    const v = state.climax[i]?.venduto || 0;
    const c = v * perc / 100;
    totV += v;
    totC += c;
    const costoEl = document.getElementById('climax-costo-' + i);
    if (costoEl) costoEl.textContent = fmt(c);
    const profEl = document.getElementById('climax-profit-' + i);
    if (profEl) profEl.textContent = 'Profitto: ' + fmt(v - c);
  });
  const totEl = document.getElementById('tot-climax');
  if (totEl) totEl.textContent = 'C.P. ' + fmt(totC);
  const tvEl = document.getElementById('climax-tot-venduto');
  if (tvEl) tvEl.textContent = fmt(totV);
  const tcEl = document.getElementById('climax-tot-costo');
  if (tcEl) tcEl.textContent = fmt(totC);
}

function updateClimaxPerc(el) {
  state.climax.costoPerc = parseNum(el.value);
  saveState();
  refreshClimaxCalcs();
  buildResoconto();
}

function updateClimaxVenduto(el) {
  const day = el.dataset.day;
  if (!state.climax[day]) state.climax[day] = { venduto: 0 };
  state.climax[day].venduto = parseNum(el.value);
  saveState();
  refreshClimaxCalcs();
  buildResoconto();
}

// BUILD AGIO
function getAllStands() {
  return [...STANDS_VENDITE.map(s => ({ id: s.id, name: s.name })), ...CORNERS.map(c => ({ id: c.id, name: c.name }))];
}

function getStandTotVendite(standId) {
  let totVendite = 0;
  if (state.vendite[standId]) {
    DAYS.forEach((_, i) => {
      totVendite += (state.vendite[standId]?.[i]?.contanti || 0) + (state.vendite[standId]?.[i]?.bancomat || 0);
    });
  }
  if (state.corners[standId]) {
    DAYS.forEach((_, i) => { totVendite += (state.corners[standId]?.[i] || 0); });
  }
  if (standId === 'fumetti') {
    let totRevue = 0;
    DAYS.forEach((_, i) => { totRevue += (state.corners['revue']?.[i] || 0); });
    totVendite -= totRevue;
  }
  if (standId === 'libri') {
    let totIppo = 0;
    DAYS.forEach((_, i) => { totIppo += (state.corners['ippocampo']?.[i] || 0); });
    totVendite -= totIppo;
  }
  if (standId === 'kids') {
    let totGlifo = 0;
    DAYS.forEach((_, i) => { totGlifo += (state.corners['glifo']?.[i] || 0); });
    totVendite -= totGlifo;
  }
  return totVendite;
}

function buildAgio() {
  const tbody = document.querySelector('#agio-table tbody');
  tbody.innerHTML = '';
  getAllStands().forEach(stand => {
    const totVendite = getStandTotVendite(stand.id);
    const agioPerc = state.agio[stand.id] || 0;
    const agioVal = totVendite * agioPerc / 100;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="text-align:left;font-weight:500">${stand.name}</td>
      <td><input type="number" step="0.1" min="0" max="100" value="${agioPerc || ''}"
        data-stand="${stand.id}" oninput="updateAgio(this)" placeholder="0">%</td>
      <td id="agio-vendite-${stand.id}">${fmt(totVendite)}</td>
      <td class="val" id="agio-ricavo-${stand.id}">${fmt(agioVal)}</td>`;
    tbody.appendChild(tr);
  });
  refreshAgioTotals();
}

function refreshAgioTotals() {
  let totRicavi = 0;
  getAllStands().forEach(stand => {
    const totVendite = getStandTotVendite(stand.id);
    const agioPerc = state.agio[stand.id] || 0;
    const agioVal = totVendite * agioPerc / 100;
    totRicavi += agioVal;
    const vendEl = document.getElementById('agio-vendite-' + stand.id);
    if (vendEl) vendEl.textContent = fmt(totVendite);
    const ricEl = document.getElementById('agio-ricavo-' + stand.id);
    if (ricEl) ricEl.textContent = fmt(agioVal);
  });
  const totEl = document.getElementById('agio-totale-ricavi');
  if (totEl) totEl.textContent = fmt(totRicavi);
}

function updateAgio(el) {
  state.agio[el.dataset.stand] = parseNum(el.value);
  saveState();
  refreshAgioTotals();
}

// BUILD SPESE
function getAllSpeseKeys() {
  const keys = SPESE_ITEMS.map(sp => sp.id);
  if (state.speseExtra) {
    state.speseExtra.forEach(se => { if (keys.indexOf(se.id) === -1) keys.push(se.id); });
  }
  return keys;
}

function getSpeseLabel(id) {
  const base = SPESE_ITEMS.find(sp => sp.id === id);
  if (base) return base.name;
  if (state.speseExtra) {
    const extra = state.speseExtra.find(se => se.id === id);
    if (extra) return extra.name;
  }
  return id;
}

function buildSpese() {
  const grid = document.getElementById('spese-grid');
  grid.innerHTML = '';
  if (!state.speseExtra) state.speseExtra = [];

  SPESE_ITEMS.forEach(sp => {
    const div = document.createElement('div');
    div.className = 'spese-item';
    div.innerHTML = `
      <label>${sp.name}</label>
      <div class="euro-wrap"><input type="number" step="0.01" min="0" value="${state.spese[sp.id] || ''}"
        data-spesa="${sp.id}" oninput="updateSpesa(this)" placeholder="0,00"></div>`;
    grid.appendChild(div);
  });

  state.speseExtra.forEach(se => {
    const div = document.createElement('div');
    div.className = 'spese-item';
    div.innerHTML = `
      <label>${se.name}</label>
      <div style="display:flex;align-items:center;gap:6px">
        <div class="euro-wrap"><input type="number" step="0.01" min="0" value="${state.spese[se.id] || ''}"
          data-spesa="${se.id}" oninput="updateSpesa(this)" placeholder="0,00"></div>
        <button onclick="rimuoviSpesa('${se.id}')" style="background:var(--danger);color:white;border:none;border-radius:4px;padding:4px 8px;cursor:pointer;font-size:.75rem">X</button>
      </div>`;
    grid.appendChild(div);
  });

  const addDiv = document.createElement('div');
  addDiv.className = 'spese-item';
  addDiv.style.background = '#e8eaf6';
  addDiv.innerHTML = `
    <input type="text" id="nuova-spesa-nome" placeholder="Nome nuova spesa" style="flex:1;padding:6px 10px;border:1.5px solid var(--border);border-radius:6px;font-size:.85rem">
    <button onclick="aggiungiSpesa()" class="btn btn-success" style="padding:6px 14px;font-size:.8rem">+ Aggiungi</button>`;
  grid.appendChild(addDiv);

  updateSpeseTotal();
}

function aggiungiSpesa() {
  const input = document.getElementById('nuova-spesa-nome');
  const nome = input.value.trim();
  if (!nome) return;
  if (!state.speseExtra) state.speseExtra = [];
  const id = 'extra_' + Date.now();
  state.speseExtra.push({ id, name: nome });
  state.spese[id] = 0;
  saveState();
  buildSpese();
}

function rimuoviSpesa(id) {
  if (!state.speseExtra) return;
  state.speseExtra = state.speseExtra.filter(se => se.id !== id);
  delete state.spese[id];
  saveState();
  buildSpese();
  buildResoconto();
}

function updateSpesa(el) {
  state.spese[el.dataset.spesa] = parseNum(el.value);
  saveState();
  updateSpeseTotal();
  buildResoconto();
}

function updateSpeseTotal() {
  let tot = 0;
  Object.values(state.spese).forEach(v => { if (typeof v === 'number') tot += v; });
  document.getElementById('spese-total-val').textContent = fmt(tot);
}

function getTotSpese() {
  let t = 0;
  Object.values(state.spese).forEach(v => t += v);
  return t;
}

function getClimaxCostoProdotto() {
  let t = 0;
  const perc = state.climax.costoPerc || 0;
  DAYS.forEach((_, i) => t += (state.climax[i]?.venduto || 0) * perc / 100);
  return t;
}

// BUILD RESOCONTO
function buildResoconto() {
  // Totali per giorno
  const tbody = document.querySelector('#totali-table tbody');
  tbody.innerHTML = '';
  let grandContanti = 0, grandBancomat = 0;

  DAYS.forEach((day, i) => {
    let dayContanti = 0, dayBancomat = 0;
    STANDS_VENDITE.forEach(st => {
      dayContanti += (state.vendite[st.id]?.[i]?.contanti || 0);
      dayBancomat += (state.vendite[st.id]?.[i]?.bancomat || 0);
    });
    grandContanti += dayContanti;
    grandBancomat += dayBancomat;
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${day}</td><td>${fmt(dayContanti)}</td><td>${fmt(dayBancomat)}</td><td>${fmt(dayContanti + dayBancomat)}</td>`;
    tbody.appendChild(tr);
  });

  const totRow = document.createElement('tr');
  totRow.innerHTML = `<td>TOTALE</td><td>${fmt(grandContanti)}</td><td>${fmt(grandBancomat)}</td><td>${fmt(grandContanti + grandBancomat)}</td>`;
  tbody.appendChild(totRow);

  // Resoconto boxes
  const totVendite = grandContanti + grandBancomat;
  const totSpese = getTotSpese();
  const cpClimax = getClimaxCostoProdotto();
  const netto = grandContanti - totSpese - cpClimax;

  const resoGrid = document.getElementById('resoconto-grid');
  resoGrid.innerHTML = `
    <div class="resoconto-box totale">
      <div class="resoconto-label">Totale Vendite</div>
      <div class="resoconto-value">${fmt(totVendite)}</div>
    </div>
    <div class="resoconto-box contanti">
      <div class="resoconto-label">Totale Contanti</div>
      <div class="resoconto-value">${fmt(grandContanti)}</div>
    </div>
    <div class="resoconto-box bancomat">
      <div class="resoconto-label">Totale Bancomat</div>
      <div class="resoconto-value">${fmt(grandBancomat)}</div>
    </div>
    <div class="resoconto-box netto">
      <div class="resoconto-label">Contanti - Spese - C.P. Climax</div>
      <div class="resoconto-value ${netto >= 0 ? 'positive' : 'negative'}">${fmt(netto)}</div>
    </div>`;
}

// TABS
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
  });
});

// RESET
function resetAll() {
  if (!confirm('Sei sicuro di voler resettare tutti i dati?')) return;
  const savedAgio = JSON.parse(JSON.stringify(state.agio));
  localStorage.removeItem('cassaTrapani2026');
  Object.assign(state, defaultState());
  state.agio = savedAgio;
  saveState();
  initAll();
}

// EXPORT CSV
function exportCSV() {
  let csv = 'Stand,Giorno,Contanti,Bancomat,Totale\n';
  STANDS_VENDITE.forEach(st => {
    DAYS.forEach((day, i) => {
      const c = state.vendite[st.id]?.[i]?.contanti || 0;
      const b = state.vendite[st.id]?.[i]?.bancomat || 0;
      csv += `"${st.name}","${day}",${c},${b},${c + b}\n`;
    });
  });
  csv += '\nCorner,Giorno,Venduto\n';
  CORNERS.forEach(corner => {
    DAYS.forEach((day, i) => {
      csv += `"${corner.name}","${day}",${state.corners[corner.id]?.[i] || 0}\n`;
    });
  });
  csv += '\nClimax,Giorno,Venduto,Costo Prodotto,Profitto\n';
  DAYS.forEach((day, i) => {
    const v = state.climax[i]?.venduto || 0;
    const c = state.climax[i]?.costo || 0;
    csv += `"Climax","${day}",${v},${c},${v - c}\n`;
  });
  csv += `\nSpesa,Importo\n`;
  SPESE_ITEMS.forEach(sp => { csv += `"${sp.name}",${state.spese[sp.id] || 0}\n`; });

  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'cassa_trapani_2026.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function pubblicaOnline() {
  const dataJson = JSON.stringify(state);
  const blob = new Blob([dataJson], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'dati-gestionale.json';
  a.click();
  setTimeout(() => {
    alert('File dati scaricato!\\nOra fai doppio clic su "Pubblica Online" sul Desktop.');
  }, 500);
}

function lockInputs() {
  document.querySelectorAll('input').forEach(el => {
    el.setAttribute('disabled', 'true');
    el.style.opacity = '0.8';
  });
  document.querySelectorAll('.btn-danger, .btn-success').forEach(el => el.style.display = 'none');
}

function initAll() {
  buildVendite();
  buildCorners();
  buildClimax();
  buildAgio();
  buildSpese();
  buildResoconto();
  if (IS_ONLINE) {
    lockInputs();
    document.getElementById('online-badge').style.display = 'inline-block';
    document.querySelectorAll('.header-actions .btn').forEach(b => {
      if (b.textContent.trim() === 'Reset' || b.textContent.trim() === 'Pubblica Online') b.style.display = 'none';
    });
  } else {
    document.getElementById('btn-pubblica').style.display = 'inline-flex';
  }
}

initAll();
</script>
